name: Desktop Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  # GitHub Actions is deprecating the Node.js 20 runtime for JavaScript actions.
  # Opt into Node.js 24 now to avoid breakage when it becomes the default (June 2, 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Build web app
        run: npm run build:web

      - name: Prepare Electron native dependencies
        run: npx electron-builder install-app-deps

      - name: Build Windows installer
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npx electron-builder --win nsis --publish never

      - name: Publish signed Windows release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis --publish always

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zaya-windows-installer
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/win-unpacked/**
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Build web app
        run: npm run build:web

      - name: Prepare Electron native dependencies
        run: npx electron-builder install-app-deps

      - name: Build macOS installer
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npx electron-builder --mac dmg --publish never

      - name: Publish signed macOS release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac dmg zip --publish always

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zaya-macos-installer
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
